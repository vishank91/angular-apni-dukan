<app-navbar></app-navbar>
<app-breadcrum title="Contact Us"></app-breadcrum>

<!--------------- contact-section---------------->
<section class="contact product footer-padding">
    <div class="container">
        <div class="contact-section">
            <div class="row">
                <div class="col-lg-6">
                    <div class="contact-info-section">
                        <div class="contact-information">
                            <h5 class="wrapper-heading">Contact Information</h5>
                            <div class="contact-wrapper">
                                <div class="row gy-5">
                                    <div class="col-sm-6">
                                        <div class="wrapper phone">
                                            <div class="wrapper-img">
                                                <i class="bi bi-telephone fs-1 myTextColor"></i>
                                            </div>
                                            <div class="wrapper-content">
                                                <h5 class="wrapper-heading">Phone</h5>
                                                <a href="tel:{{settingData.phone}}" class="paragraph myTextColor" target="_blank">{{settingData.phone}}</a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="wrapper phone">
                                            <div class="wrapper-img">
                                                <i class="bi bi-envelope fs-1 myTextColor"></i>
                                            </div>
                                            <div class="wrapper-content">
                                                <h5 class="wrapper-heading">Email</h5>
                                                <a href="mailto:{{settingData.email}}" class="paragraph myTextColor" target="_blank">{{settingData.email}}</a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="wrapper phone">
                                            <div class="wrapper-img">
                                                <i class="bi bi-whatsapp fs-1 myTextColor"></i>
                                            </div>
                                            <div class="wrapper-content">
                                                <h5 class="wrapper-heading">Whatsapp</h5>
                                                <a href="https://wa.me/{{settingData.whatsapp}}" class="paragraph myTextColor" target="_blank">{{settingData.whatsapp}}</a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="wrapper phone">
                                            <div class="wrapper-img">
                                                <i class="bi bi-geo-alt fs-1 myTextColor"></i>
                                            </div>
                                            <div class="wrapper-content">
                                                <h5 class="wrapper-heading">Address</h5>
                                                <a href="{{settingData.map1}}" class="paragraph myTextColor" target="_blank">{{settingData.address}}</a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-lg-12">
                                        <div class="address">
                                            <div class="contact-map">
                                                <iframe
                                                    src="https://maps.google.com/maps?width=650&height=400&hl=en&q=A-43%2C%20Bloack%20A%2C%20Sector%2016%2C%20Noida&t=&z=14&ie=UTF8&iwloc=B&output=embed"
                                                    width="524" height="206"></iframe>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="question-section login-section ">
                        <app-contact-us-form></app-contact-us-form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!--------------- contact-section-end---------------->
<app-footer></app-footer>
