<app-navbar></app-navbar>

<div class="container-fluid my-3 ">
    <div class="blog">
        <div class="row">
            <div class="col-md-3">
                <app-sidebar></app-sidebar>
            </div>
            <div class="col-md-9">
                <h6 class="fs-2 myBackground text-center p-2 text-light">Create Maincategory
                    <a routerLink="/admin/maincategory"><i class="bi bi-arrow-left fs-2 text-light float-end"></i></a>
                </h6>
                <form [formGroup]="myForm" (submit)="postData()">
                    <div class="row">
                        <div class="col-12 mb-3">
                            <label>Quesion*</label>
                            <input type="text" name="question" (keyup)="setErrorMessage()" formControlName="question"
                                [ngClass]="(question.touched && question.invalid) || questionError?'border-danger':'myBorderColor'"
                                class="form-control" placeholder="Faq Question">
                            @if (question.invalid && question.touched) {
                            <p class="text-danger">Question Field is Mendatory </p>
                            }
                            @if (questionError) {
                            <p class="text-danger">{{questionError}}</p>
                            }
                        </div>

                        <div class="col-12 mb-3">
                            <label>Answer*</label>
                            <textarea name="answer" (keyup)="setErrorMessage()" formControlName="answer"
                                [ngClass]="answer.touched && answer.invalid?'border-danger':'myBorderColor'"
                                class="form-control" placeholder="Faq Answer" rows="3"></textarea>
                            @if (answer.invalid && answer.touched) {
                            <p class="text-danger">Answer Field is Mendatory </p>
                            }

                        </div>

                        <div class="col-lg-6 mb-3">
                            <label>Status*</label>
                            <select name="status" formControlName="status" class="form-select myBorderColor">
                                <option value="1">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>

                        <div class="col-12 my-3">
                            <button type="submit" [disabled]="myForm.invalid"
                                class="shop-btn myBackground btn-lg p-3 w-100">Create</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<app-footer></app-footer>
