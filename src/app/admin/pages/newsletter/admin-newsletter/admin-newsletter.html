<app-navbar></app-navbar>

<div class="container-fluid my-3 ">
    <div class="blog">
        <div class="row">
            <div class="col-md-3">
                <app-sidebar></app-sidebar>
            </div>
            <div class="col-md-9">
                <h6 class="fs-2 myBackground text-center p-2 text-light">Newsletter</h6>
                <div class="table-responsive">
                    <table class="table table-bordered" id="dataTable">
                        <thead>
                            <tr>
                                <th>Id</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            @for (item of data; track $index) {
                            <tr>
                                <td>{{item.id}}</td>
                                <td>{{item.email}}</td>
                                <td style="cursor: pointer;" title="Click Here to Change Status" (click)="updateRecord(item.id)">{{item.status?"Active":"Inactive"}}</td>
                                <td><button (click)="deleteRecord(item.id)" class="btn btn-danger p-2"><i
                                            class="bi bi-x fs-3"></i></button></td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<app-footer></app-footer>
