<app-navbar></app-navbar>

<div class="container-fluid my-3 ">
    <div class="blog">
        <div class="row">
            <div class="col-md-3">
                <app-sidebar></app-sidebar>
            </div>
            <div class="col-md-9">
                <h6 class="fs-2 myBackground text-center p-2 text-light">Maincategory
                    <a routerLink="/admin/maincategory/create"><i class="bi bi-plus fs-2 text-light float-end"></i></a>
                </h6>
                <div class="table-responsive">
                    <table class="table table-bordered" id="dataTable">
                        <thead>
                            <tr>
                                <th>Id</th>
                                <th>Name</th>
                                <th>Pic</th>
                                <th>Status</th>
                                <th></th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            @for (item of data; track $index) {
                            <tr>
                                <td>{{item.id}}</td>
                                <td>{{item.name}}</td>
                                <td>
                                    <a href="{{imageServerUrl}}/{{item.pic}}" target="_blank">
                                        <img src="{{imageServerUrl}}/{{item.pic}}" height="70px" width="70px" alt="">
                                    </a>
                                </td>
                                <td>{{item.status?"Active":"Inactive"}}</td>
                                <td><a [routerLink]="['/admin/maincategory/update']" [queryParams]="{id:item.id}"
                                        class="btn btn-primary btn-lg myBackground"><i
                                            class="bi bi-pencil fs-3"></i></a>
                                </td>
                                <td>
                                    @if(role==="Super Admin"){
                                    <button (click)="deleteRecord(item.id)" class="btn btn-danger p-2"><i
                                            class="bi bi-x fs-3"></i></button>
                                    }
                                </td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<app-footer></app-footer>
